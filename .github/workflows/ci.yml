name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore BeDemo.sln

      - name: Format (verify)
        run: dotnet format BeDemo.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build BeDemo.sln --no-restore -c Release --no-incremental

      - name: Test
        run: dotnet test BeDemo.sln --no-build -c Release --verbosity minimal
