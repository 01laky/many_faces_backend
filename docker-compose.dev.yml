version: '3.8'

services:
  admin-demo-api:
    build:
      context: ./AdminDemo.Api
      dockerfile: Dockerfile.dev
    container_name: admin-demo-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/AdminDemoDb.db
    volumes:
      - ./AdminDemo.Api/data:/app/data
      - ./AdminDemo.Api:/app
    restart: unless-stopped
    networks:
      - admin-demo-network

networks:
  admin-demo-network:
    driver: bridge
