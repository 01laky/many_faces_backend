version: '3.8'

services:
  # Seq - Structured logging server with web UI
  seq:
    image: datalust/seq:latest
    container_name: be-demo-seq
    ports:
      - "5341:80"   # HTTP port for Seq web UI
      - "5342:5341" # Seq ingestion port (for logs)
    environment:
      - ACCEPT_EULA=Y
      # Simple credentials for development
      - SEQ_FIRSTRUN_ADMINUSERNAME=admin
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin
    volumes:
      - seq-data:/data
    restart: unless-stopped
    networks:
      - be-demo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  be-demo-api:
    build:
      context: .
      dockerfile: BeDemo.Api/Dockerfile.dev
    container_name: be-demo-api
    working_dir: /src/BeDemo.Api
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # HTTPS
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://0.0.0.0:8001;http://0.0.0.0:8000
      - ASPNETCORE_Kestrel__Certificates__Default__Password=
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/src/BeDemo.Api/https/dev-cert.pfx
      - ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=54320;Database=bedemo;Username=bedemo_user;Password=bedemo_password
      - Serilog__WriteTo__0__Name=Seq
      - Serilog__WriteTo__0__Args__serverUrl=http://seq:5341
    volumes:
      - ./BeDemo.Api/data:/src/BeDemo.Api/data
      - ./BeDemo.Api:/src/BeDemo.Api
      - ./BeDemo.Api/https:/src/BeDemo.Api/https:ro
      - ./many_faces_proto:/src/many_faces_proto:ro
    depends_on:
      - seq
    restart: unless-stopped
    networks:
      - be-demo-network

volumes:
  seq-data:

networks:
  be-demo-network:
    driver: bridge
